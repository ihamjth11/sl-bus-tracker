<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Bus Body -->
  <rect x="15" y="35" width="70" height="35" rx="8" fill="url(#accent)"/>
  <!-- Bus Top -->
  <rect x="20" y="25" width="60" height="15" rx="6" fill="url(#accent)" opacity="0.8"/>
  <!-- Windows -->
  <rect x="24" y="28" width="12" height="9" rx="2" fill="#0f172a" opacity="0.7"/>
  <rect x="40" y="28" width="12" height="9" rx="2" fill="#0f172a" opacity="0.7"/>
  <rect x="56" y="28" width="12" height="9" rx="2" fill="#0f172a" opacity="0.7"/>
  <!-- Bus Windows bottom -->
  <rect x="22" y="42" width="14" height="10" rx="2" fill="#0f172a" opacity="0.5"/>
  <rect x="42" y="42" width="14" height="10" rx="2" fill="#0f172a" opacity="0.5"/>
  <rect x="62" y="42" width="14" height="10" rx="2" fill="#0f172a" opacity="0.5"/>
  <!-- Wheels -->
  <circle cx="30" cy="73" r="7" fill="#1e293b" stroke="url(#accent)" stroke-width="2.5"/>
  <circle cx="70" cy="73" r="7" fill="#1e293b" stroke="url(#accent)" stroke-width="2.5"/>
  <circle cx="30" cy="73" r="3" fill="url(#accent)"/>
  <circle cx="70" cy="73" r="3" fill="url(#accent)"/>
  <!-- SL Text -->
  <text x="50" y="90" font-family="Arial" font-weight="bold" font-size="8" fill="#38bdf8" text-anchor="middle">SRI LANKA</text>
</svg>